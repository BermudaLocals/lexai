<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTHERSHIP — Dollar Double Empire</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --bg: #020409;
    --bg2: #080d14;
    --bg3: #0d1520;
    --gold: #f5a623;
    --gold2: #ffcc44;
    --cyan: #00d4ff;
    --green: #00ff88;
    --red: #ff3b5c;
    --purple: #9b5de5;
    --border: rgba(245,166,35,0.2);
    --text: #c8d8e8;
    --dim: #5a6a7a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(245,166,35,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* SCANLINE EFFECT */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,13,20,0.9);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    border: 2px solid var(--gold);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(245,166,35,0.3);
    animation: pulse-border 3s ease-in-out infinite;
  }
  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 20px rgba(245,166,35,0.3); }
    50% { box-shadow: 0 0 40px rgba(245,166,35,0.6); }
  }
  .logo-text h1 {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 4px;
  }
  .logo-text p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
  }
  .header-status {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #uptime {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--cyan);
  }

  /* STAT CARDS */
  .stats-row {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    border-bottom: 1px solid var(--border);
    background: var(--border);
  }
  .stat-card {
    background: var(--bg2);
    padding: 20px 24px;
    text-align: center;
  }
  .stat-card .val {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-card .lbl {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
  }
  .val.gold { color: var(--gold); }
  .val.green { color: var(--green); }
  .val.cyan { color: var(--cyan); }
  .val.red { color: var(--red); }
  .val.purple { color: var(--purple); }

  /* MAIN GRID */
  .main {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 1px;
    background: var(--border);
    min-height: calc(100vh - 160px);
  }
  .panel {
    background: var(--bg2);
    padding: 24px;
  }
  .panel.full { grid-column: 1 / -1; }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }
  .panel-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--dim);
  }

  /* CONTAINERS */
  .container-list { display: flex; flex-direction: column; gap: 8px; }
  .container-item {
    display: grid;
    grid-template-columns: 8px 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg3);
    border: 1px solid transparent;
    border-radius: 4px;
    transition: border-color 0.2s;
  }
  .container-item:hover { border-color: var(--border); }
  .c-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .c-dot.running { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .c-dot.exited { background: var(--red); }
  .c-dot.paused { background: var(--gold); }
  .c-info { min-width: 0; }
  .c-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--cyan);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .c-image { font-size: 10px; color: var(--dim); margin-top: 2px; }
  .c-status { font-size: 10px; color: var(--dim); white-space: nowrap; }
  .c-actions { display: flex; gap: 4px; }
  .c-btn {
    padding: 3px 8px;
    font-size: 9px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .c-btn:hover { border-color: var(--gold); color: var(--gold); }
  .c-btn.restart:hover { border-color: var(--cyan); color: var(--cyan); }

  /* PROJECTS */
  .project-list { display: flex; flex-direction: column; gap: 6px; }
  .project-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg3);
    border-left: 3px solid transparent;
    border-radius: 0 4px 4px 0;
    cursor: pointer;
    transition: all 0.2s;
  }
  .project-item:hover { background: rgba(245,166,35,0.05); }
  .project-item.live { border-left-color: var(--green); }
  .project-item.deploying { border-left-color: var(--gold); }
  .project-item.pending { border-left-color: var(--dim); }
  .project-item.error { border-left-color: var(--red); }
  .p-name { font-size: 13px; font-weight: 600; }
  .p-cat {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--dim);
    margin-top: 2px;
  }
  .p-status-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .p-status-badge.live { background: rgba(0,255,136,0.1); color: var(--green); }
  .p-status-badge.deploying { background: rgba(245,166,35,0.1); color: var(--gold); animation: blink 1.5s infinite; }
  .p-status-badge.pending { background: rgba(90,106,122,0.1); color: var(--dim); }
  .p-status-badge.error { background: rgba(255,59,92,0.1); color: var(--red); }
  .p-priority { font-size: 10px; color: var(--dim); }

  /* VAULT */
  .vault-form {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 8px;
    margin-bottom: 16px;
  }
  .vault-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }
  .vault-input:focus { border-color: var(--gold); }
  .vault-btn {
    background: var(--gold);
    color: var(--bg);
    border: none;
    padding: 8px 16px;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .vault-btn:hover { background: var(--gold2); }
  .vault-list { display: flex; flex-direction: column; gap: 4px; max-height: 240px; overflow-y: auto; }
  .vault-item {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg3);
    border-radius: 3px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
  }
  .vault-key { color: var(--cyan); }
  .vault-val { color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .vault-del {
    background: none; border: none; color: var(--red);
    cursor: pointer; font-size: 14px; padding: 0 4px;
    opacity: 0.5; transition: opacity 0.15s;
  }
  .vault-del:hover { opacity: 1; }

  /* EXTRACTOR */
  .extractor-form { display: flex; flex-direction: column; gap: 10px; }
  .extractor-path {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }
  .extract-results {
    max-height: 200px;
    overflow-y: auto;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    display: none;
  }
  .extract-results.show { display: block; }
  .extract-convo { margin-bottom: 12px; }
  .extract-convo-title { color: var(--gold); margin-bottom: 6px; }
  .extract-msg { margin-bottom: 4px; }
  .extract-msg .role { color: var(--cyan); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--bg3);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 10px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    border-radius: 4px;
    z-index: 9998;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <div class="logo-text">
      <h1>MOTHERSHIP</h1>
      <p>DOLLAR DOUBLE EMPIRE · COMMAND CENTER</p>
    </div>
  </div>
  <div class="header-status">
    <div class="status-pill"><div class="status-dot"></div> ONLINE</div>
    <div id="uptime">UP: 00:00:00</div>
  </div>
</header>

<div class="stats-row">
  <div class="stat-card"><div class="val gold" id="s-projects">—</div><div class="lbl">Projects</div></div>
  <div class="stat-card"><div class="val green" id="s-live">—</div><div class="lbl">Live</div></div>
  <div class="stat-card"><div class="val gold" id="s-deploying">—</div><div class="lbl">Deploying</div></div>
  <div class="stat-card"><div class="val cyan" id="s-containers">—</div><div class="lbl">Containers</div></div>
  <div class="stat-card"><div class="val purple" id="s-secrets">—</div><div class="lbl">Secrets</div></div>
</div>

<div class="main">

  <!-- CONTAINERS -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">🐳 Docker Containers</div>
      <button class="c-btn" onclick="loadContainers()">REFRESH</button>
    </div>
    <div class="container-list" id="container-list">
      <div style="color:var(--dim);font-size:12px;font-family:'Share Tech Mono',monospace">Loading...</div>
    </div>
  </div>

  <!-- PROJECTS -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">🚀 Empire Projects</div>
      <span class="panel-badge">Railway + Local</span>
    </div>
    <div class="project-list" id="project-list">
      <div style="color:var(--dim);font-size:12px;font-family:'Share Tech Mono',monospace">Loading...</div>
    </div>
  </div>

  <!-- VAULT -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">🔐 Secrets Vault</div>
      <span class="panel-badge">ENCRYPTED AT REST</span>
    </div>
    <div class="vault-form">
      <input class="vault-input" id="v-key" placeholder="KEY (e.g. STRIPE_KEY)">
      <input class="vault-input" id="v-val" placeholder="VALUE" type="password">
      <button class="vault-btn" onclick="addSecret()">STORE</button>
    </div>
    <div class="vault-list" id="vault-list"></div>
  </div>

  <!-- CHAT EXTRACTOR -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">📂 ChatGPT Extractor</div>
      <span class="panel-badge">conversations.json</span>
    </div>
    <div class="extractor-form">
      <div class="extractor-path">
        <input class="vault-input" id="ex-path" 
          placeholder="Path to conversations.json inside container"
          value="/mnt/conversations.json">
        <button class="vault-btn" onclick="extractHistory()">EXTRACT</button>
      </div>
      <input class="vault-input" id="ex-targets" 
        placeholder="Titles to extract (comma-separated, or blank for all)">
      <div class="extract-results" id="extract-results"></div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
const socket = io();
let uptimeSeconds = 0;

// ── UPTIME ─────────────────────────────────────────────────────────
setInterval(() => {
  uptimeSeconds++;
  const h = String(Math.floor(uptimeSeconds/3600)).padStart(2,'0');
  const m = String(Math.floor((uptimeSeconds%3600)/60)).padStart(2,'0');
  const s = String(uptimeSeconds%60).padStart(2,'0');
  document.getElementById('uptime').textContent = `UP: ${h}:${m}:${s}`;
}, 1000);

// ── TOAST ──────────────────────────────────────────────────────────
function toast(msg, color='var(--gold)') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color;
  t.style.color = color;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── STATS ──────────────────────────────────────────────────────────
async function loadStats() {
  const r = await fetch('/api/stats').then(r=>r.json()).catch(()=>({}));
  document.getElementById('s-projects').textContent = r.projects || 0;
  document.getElementById('s-live').textContent = r.live || 0;
  document.getElementById('s-deploying').textContent = r.deploying || 0;
  document.getElementById('s-secrets').textContent = r.secrets || 0;
  uptimeSeconds = Math.floor(r.uptime || 0);
}

// ── CONTAINERS ─────────────────────────────────────────────────────
async function loadContainers() {
  const containers = await fetch('/api/containers').then(r=>r.json()).catch(()=>[]);
  document.getElementById('s-containers').textContent = containers.length;
  const list = document.getElementById('container-list');
  if (!containers.length) {
    list.innerHTML = '<div style="color:var(--dim);font-size:11px;font-family:\'Share Tech Mono\',monospace">No containers found — mount Docker socket</div>';
    return;
  }
  list.innerHTML = containers.map(c => {
    const state = c.state === 'running' ? 'running' : c.state === 'exited' ? 'exited' : 'paused';
    return `
    <div class="container-item">
      <div class="c-dot ${state}"></div>
      <div class="c-info">
        <div class="c-name">${c.name}</div>
        <div class="c-image">${c.image.substring(0,40)}</div>
      </div>
      <div class="c-status">${c.status}</div>
      <div class="c-actions">
        ${state !== 'running' ? `<button class="c-btn" onclick="containerAction('${c.id}','start')">START</button>` : ''}
        ${state === 'running' ? `<button class="c-btn" onclick="containerAction('${c.id}','stop')">STOP</button>` : ''}
        <button class="c-btn restart" onclick="containerAction('${c.id}','restart')">↺</button>
      </div>
    </div>`;
  }).join('');
}

async function containerAction(id, action) {
  await fetch(`/api/containers/${id}/${action}`, {method:'POST'});
  toast(`Container ${action}ed`);
  setTimeout(loadContainers, 1500);
}

// ── PROJECTS ───────────────────────────────────────────────────────
async function loadProjects() {
  const projects = await fetch('/api/projects').then(r=>r.json()).catch(()=>[]);
  const list = document.getElementById('project-list');
  list.innerHTML = projects.map(p => `
    <div class="project-item ${p.status}" onclick="toggleProjectStatus(${p.id}, '${p.status}')">
      <div>
        <div class="p-name">${p.name}</div>
        <div class="p-cat">${p.category} · P${p.priority}</div>
      </div>
      <span class="p-status-badge ${p.status}">${p.status}</span>
      ${p.url ? `<a href="${p.url}" target="_blank" style="color:var(--cyan);font-size:10px;text-decoration:none">↗</a>` : '<span></span>'}
    </div>
  `).join('');
}

async function toggleProjectStatus(id, current) {
  const cycle = { pending:'deploying', deploying:'live', live:'error', error:'pending' };
  const next = cycle[current] || 'pending';
  await fetch('/api/projects', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ id, status: next })
  });
  loadProjects();
  loadStats();
  toast(`Status updated to ${next}`);
}

// ── VAULT ──────────────────────────────────────────────────────────
async function loadVault() {
  const vault = await fetch('/api/vault').then(r=>r.json()).catch(()=>({}));
  const list = document.getElementById('vault-list');
  const entries = Object.entries(vault);
  if (!entries.length) {
    list.innerHTML = '<div style="color:var(--dim);font-size:11px;font-family:\'Share Tech Mono\',monospace;padding:8px">No secrets stored yet</div>';
    return;
  }
  list.innerHTML = entries.map(([k,v]) => `
    <div class="vault-item">
      <div class="vault-key">${k}</div>
      <div class="vault-val">••••••••••••</div>
      <button class="vault-del" onclick="deleteSecret('${k}')">×</button>
    </div>
  `).join('');
}

async function addSecret() {
  const key = document.getElementById('v-key').value.trim();
  const value = document.getElementById('v-val').value.trim();
  if (!key || !value) return toast('Key and value required', 'var(--red)');
  await fetch('/api/vault', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ key, value })
  });
  document.getElementById('v-key').value = '';
  document.getElementById('v-val').value = '';
  loadVault();
  loadStats();
  toast(`Secret "${key}" stored`);
}

async function deleteSecret(key) {
  await fetch(`/api/vault/${key}`, {method:'DELETE'});
  loadVault();
  loadStats();
  toast(`Secret "${key}" deleted`, 'var(--red)');
}

// ── EXTRACTOR ──────────────────────────────────────────────────────
async function extractHistory() {
  const filePath = document.getElementById('ex-path').value.trim();
  const targetsRaw = document.getElementById('ex-targets').value.trim();
  const targets = targetsRaw ? targetsRaw.split(',').map(t=>t.trim()) : null;
  
  toast('Extracting...', 'var(--cyan)');
  const r = await fetch('/api/extract-history', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ filePath, targets })
  }).then(r=>r.json()).catch(e=>({ error: e.message }));

  const el = document.getElementById('extract-results');
  el.classList.add('show');
  
  if (r.error) {
    el.innerHTML = `<span style="color:var(--red)">${r.error}</span>`;
    return;
  }
  
  toast(`Extracted ${r.count} conversations`, 'var(--green)');
  el.innerHTML = r.results.slice(0,5).map(convo => `
    <div class="extract-convo">
      <div class="extract-convo-title">▶ ${convo.title}</div>
      ${convo.messages.slice(0,2).map(m => `
        <div class="extract-msg">
          <span class="role">[${m.role}]</span> ${m.text.substring(0,200)}...
        </div>
      `).join('')}
    </div>
  `).join('') + (r.count > 5 ? `<div style="color:var(--dim)">...and ${r.count-5} more. Full data saved to /data/chat_history.json</div>` : '');
}

// ── SOCKET EVENTS ──────────────────────────────────────────────────
socket.on('refresh_containers', loadContainers);
socket.on('containers_update', loadContainers);

// ── INIT ───────────────────────────────────────────────────────────
loadStats();
loadContainers();
loadProjects();
loadVault();
setInterval(() => { loadStats(); loadContainers(); }, 30000);
</script>
</body>
</html>
