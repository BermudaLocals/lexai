<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign in — LexAI.llc</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--bg:#070709;--s:#0f0f12;--s2:#16161a;--border:rgba(212,175,55,.1);--gold:#d4af37;--gold2:#f0d060;--text:#ece9e0;--muted:#7a766c;--serif:'Playfair Display',serif;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(212,175,55,.03) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.card{position:relative;z-index:1;background:var(--s);border:1px solid var(--border);border-radius:12px;padding:44px 40px;width:100%;max-width:420px}
.logo{font-family:var(--serif);font-size:26px;font-weight:900;color:#fff;text-align:center;margin-bottom:4px;text-decoration:none;display:block}
.logo span{color:var(--gold)}
.tagline{text-align:center;font-size:12px;color:var(--muted);margin-bottom:36px;font-family:var(--mono)}
.msg{font-size:12px;text-align:center;padding:10px;border-radius:6px;margin-bottom:16px;display:none;font-family:var(--mono)}
.msg.ok{background:rgba(212,175,55,.08);color:var(--gold);border:1px solid var(--border)}
.msg.err{background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.15)}
.oauth{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .2s;margin-bottom:10px;font-family:var(--sans)}
.oauth:hover{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.04)}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:11px;font-family:var(--mono)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
label{display:block;font-size:10px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono)}
input[type=email]{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:6px;color:var(--text);font-size:13px;padding:11px 13px;outline:none;font-family:var(--sans);transition:border-color .15s;margin-bottom:14px}
input[type=email]:focus{border-color:var(--gold)}
.submit{width:100%;background:var(--gold);color:#070709;border:none;border-radius:7px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s}
.submit:hover{background:var(--gold2)}
.submit:disabled{opacity:.5;cursor:not-allowed}
.switch{text-align:center;margin-top:24px;font-size:12px;color:var(--muted);font-family:var(--mono)}
.switch a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">LexAI<span>.llc</span></a>
  <div class="tagline">Legal AI that learns your practice</div>
  <div id="msg" class="msg"></div>

  <a href="/auth/google" class="oauth">
    <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </a>
  <a href="/auth/github" class="oauth">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
    Continue with GitHub
  </a>

  <div class="divider">or use email</div>

  <form onsubmit="sendLink(event)">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" required>
    <button type="submit" class="submit" id="btn">Send magic link →</button>
  </form>

  <div class="switch">No account? <a href="/login">Sign up free</a></div>
</div>

<script>
async function sendLink(e) {
  e.preventDefault()
  const email = document.getElementById('email').value
  const btn = document.getElementById('btn'); const msg = document.getElementById('msg')
  btn.disabled = true; btn.textContent = 'Sending...'
  try {
    const r = await fetch('/auth/magic-link', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email}) })
    const d = await r.json()
    msg.style.display = 'block'
    if (d.success) { msg.className='msg ok'; msg.textContent='✓ Magic link sent — check your inbox'; btn.textContent='Sent!' }
    else { msg.className='msg err'; msg.textContent=d.error||'Failed'; btn.disabled=false; btn.textContent='Send magic link →' }
  } catch { msg.style.display='block'; msg.className='msg err'; msg.textContent='Network error'; btn.disabled=false; btn.textContent='Send magic link →' }
}
const p = new URLSearchParams(location.search)
if (p.get('error')) { const m=document.getElementById('msg'); m.style.display='block'; m.className='msg err'; m.textContent='Login failed. Please try again.' }
</script>
</body>
</html>
