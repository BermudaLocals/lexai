<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign in — LexAI.llc</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--bg:#070709;--s:#0f0f12;--s2:#16161a;--border:rgba(212,175,55,.1);--gold:#d4af37;--gold2:#f0d060;--text:#ece9e0;--muted:#7a766c;--serif:'Playfair Display',serif;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(212,175,55,.03) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.card{position:relative;z-index:1;background:var(--s);border:1px solid var(--border);border-radius:12px;padding:44px 40px;width:100%;max-width:420px}
.logo{font-family:var(--serif);font-size:26px;font-weight:900;color:#fff;text-align:center;margin-bottom:4px;text-decoration:none;display:block}
.logo span{color:var(--gold)}
.tagline{text-align:center;font-size:12px;color:var(--muted);margin-bottom:36px;font-family:var(--mono)}
.msg{font-size:12px;text-align:center;padding:10px;border-radius:6px;margin-bottom:16px;display:none;font-family:var(--mono)}
.msg.ok{background:rgba(212,175,55,.08);color:var(--gold);border:1px solid var(--border)}
.msg.err{background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.15)}
.oauth{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .2s;margin-bottom:10px;font-family:var(--sans)}
.oauth:hover{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.04)}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:11px;font-family:var(--mono)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
label{display:block;font-size:10px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono)}
input[type=email]{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:6px;color:var(--text);font-size:13px;padding:11px 13px;outline:none;font-family:var(--sans);transition:border-color .15s;margin-bottom:14px}
input[type=email]:focus{border-color:var(--gold)}
input[type=password]{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:6px;color:var(--text);font-size:13px;padding:11px 13px;outline:none;font-family:var(--sans);transition:border-color .15s;margin-bottom:14px}
input[type=password]:focus{border-color:var(--gold)}
.submit{width:100%;background:var(--gold);color:#070709;border:none;border-radius:7px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s}
.submit:hover{background:var(--gold2)}
.submit:disabled{opacity:.5;cursor:not-allowed}
.switch{text-align:center;margin-top:24px;font-size:12px;color:var(--muted);font-family:var(--mono)}
.switch a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">LexAI<span>.llc</span></a>
  <div class="tagline">Legal AI that learns your practice</div>
  <div id="msg" class="msg"></div>

  <a href="/auth/google" class="oauth">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.48A4.8 4.8 0 014.5 7.5V5.43H1.83a8 8 0 000 7.14z"/><path fill="#EA4335" d="M8.98 3.58c1.32 0 2.5.45 3.44 1.35l2.54-2.54A8 8 0 001.83 5.43L4.5 7.5a4.8 4.8 0 014.48-3.92z"/></svg>
    Continue with Google
  </a>
  

  

  <form id="loginForm" onsubmit="sendLogin(event)">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" required>
    <label>Password</label>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit" class="submit" id="btn">Log In</button>
  </form>

  <div class="switch">No account? <a href="/signup">Sign up free</a></div>
</div>

<script>
async function sendLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  btn.textContent = 'Logging in...';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    msg.style.display = 'block';
    if (d.token) {
      localStorage.setItem('lexai_token', d.token);
      msg.className = 'msg ok';
      msg.textContent = '✓ Logged in! Redirecting...';
      setTimeout(() => {
        window.location.href = '/dashboard.html';
      }, 1500);
    } else {
      msg.className = 'msg err';
      msg.textContent = d.error || 'Login failed';
      btn.disabled = false;
      btn.textContent = 'Log In';
    }
  } catch {
    msg.style.display = 'block';
    msg.className = 'msg err';
    msg.textContent = 'Network error';
    btn.disabled = false;
    btn.textContent = 'Log In';
  }
}
const p = new URLSearchParams(location.search);
if (p.get('error')) {
  const m = document.getElementById('msg');
  m.style.display = 'block';
  m.className = 'msg err';
  m.textContent = 'Login failed. Please try again.';
}
</script>
</body>
</html>
